<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <!-- Radar rings -->
  <circle cx="256" cy="280" r="160" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
  <circle cx="256" cy="280" r="110" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.12"/>
  <circle cx="256" cy="280" r="60" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1"/>
  <!-- Radar sweep line -->
  <line x1="256" y1="280" x2="380" y2="160" stroke="#60a5fa" stroke-width="3" opacity="0.5"/>
  <!-- Airplane silhouette -->
  <g transform="translate(256,240) rotate(-30)">
    <!-- Fuselage -->
    <path d="M0,-90 L12,-30 L8,70 L0,85 L-8,70 L-12,-30 Z" fill="#ffffff"/>
    <!-- Wings -->
    <path d="M-8,-15 L-75,20 L-75,30 L-8,5 Z" fill="#ffffff"/>
    <path d="M8,-15 L75,20 L75,30 L8,5 Z" fill="#ffffff"/>
    <!-- Tail -->
    <path d="M-6,55 L-35,75 L-35,80 L-6,68 Z" fill="#ffffff"/>
    <path d="M6,55 L35,75 L35,80 L6,68 Z" fill="#ffffff"/>
  </g>
  <!-- Radar dot -->
  <circle cx="340" cy="200" r="6" fill="#60a5fa" opacity="0.8"/>
</svg>
